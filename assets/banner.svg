<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E62B1E;stop-opacity:0">
        <animate attributeName="stop-opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#E62B1E;stop-opacity:0.8">
        <animate attributeName="stop-opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#E62B1E;stop-opacity:0">
        <animate attributeName="stop-opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite" begin="1s"/>
      </stop>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)" rx="12"/>

  <!-- Animated glow orb -->
  <ellipse cx="450" cy="160" rx="280" ry="100" fill="url(#redGlow)" opacity="0.15" filter="url(#softGlow)">
    <animate attributeName="rx" values="280;320;280" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="100;120;100" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Shimmer overlay -->
  <rect width="900" height="320" fill="url(#shimmer)" rx="12"/>

  <!-- Decorative lines -->
  <line x1="100" y1="72" x2="800" y2="72" stroke="#E62B1E" stroke-width="0.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="100" y1="248" x2="800" y2="248" stroke="#E62B1E" stroke-width="0.5" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite" begin="2s"/>
  </line>

  <!-- Corner accents -->
  <path d="M 30 30 L 30 55 M 30 30 L 55 30" stroke="#E62B1E" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 870 30 L 870 55 M 870 30 L 845 30" stroke="#E62B1E" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 30 290 L 30 265 M 30 290 L 55 290" stroke="#E62B1E" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 870 290 L 870 265 M 870 290 L 845 290" stroke="#E62B1E" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Topline -->
  <text x="450" y="105" text-anchor="middle" fill="#999999" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" letter-spacing="6" font-weight="300">
    IDEAS WORTH SPREADING — NASHIK
  </text>

  <!-- Main title: TEDx in red -->
  <text x="370" y="170" text-anchor="end" fill="#E62B1E" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="-1" filter="url(#glow)">
    TEDx
  </text>
  <!-- MET Nashik in white -->
  <text x="380" y="170" text-anchor="start" fill="#FFFFFF" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="-1">
    MET Nashik
  </text>

  <!-- Subtitle -->
  <text x="450" y="210" text-anchor="middle" fill="#CCCCCC" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" letter-spacing="2">
    Speaker Nominations 2026
  </text>

  <!-- Animated pulse dot -->
  <circle cx="450" cy="265" r="4" fill="#E62B1E">
    <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="450" y="285" text-anchor="middle" fill="#666666" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" letter-spacing="3" font-weight="300">
    NOMINATIONS OPEN
  </text>
</svg>
